<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/webrtc-adapter/8.1.2/adapter.min.js"
      integrity="sha512-l40eBFtXx+ve5RryIELC3y6/OM6Nu89mLGQd7fg1C93tN6XrkC3supb+/YiD/Y+B8P37kdJjtG1MT1kOO2VzxA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="stylesheet" href="./styles.css" />
    <title>LiveCC Single Room</title>
  </head>
  <body>
    <main class="app-shell">
      <section class="player-card">
        <div class="player-topbar">
          <div class="brand">LiveCC</div>
          <div class="status-pill idle" id="status-pill">待机中</div>
        </div>

        <div class="video-shell">
          <video id="main-video" autoplay playsinline muted></video>
          <div class="empty-state" id="empty-state">
            <h1 id="empty-title">当前未开播</h1>
            <p id="empty-copy">主播开始投屏后，这个页面会自动播放直播。</p>
          </div>
        </div>

        <div class="control-bar">
          <div class="primary-actions">
            <button id="start-btn" class="primary-btn">开始投屏</button>
            <button id="stop-btn" class="secondary-btn" disabled>停止</button>
          </div>

          <div class="secondary-actions">
            <button id="mute-btn" class="ghost-btn">取消静音</button>
            <button id="fullscreen-btn" class="ghost-btn">全屏</button>
          </div>
        </div>

        <div class="status-line" id="status-text">页面加载完成，正在检查当前直播状态。</div>

        <details class="advanced-panel" hidden aria-hidden="true">
          <summary>高级设置</summary>
          <div class="advanced-grid">
            <label class="field">
              <span>管理密钥</span>
              <input id="host-token" type="password" placeholder="如已配置 HOST_TOKEN，在此输入" />
            </label>

            <label class="field">
              <span>分辨率</span>
              <select id="resolution-select">
                <option value="720p" selected>720p</option>
                <option value="1080p">1080p</option>
              </select>
            </label>

            <label class="field">
              <span>帧率</span>
              <select id="fps-select">
                <option value="60" selected>60 fps</option>
                <option value="30">30 fps</option>
              </select>
            </label>

            <label class="field">
              <span>音量</span>
              <input id="volume-range" type="range" min="0" max="100" value="80" />
            </label>

            <label class="toggle-row">
              <span>系统音频</span>
              <input id="audio-toggle" type="checkbox" checked />
            </label>

            <label class="field">
              <span>清晰度标记</span>
              <select id="quality-select">
                <option value="Auto" selected>Auto</option>
                <option value="1080p">1080p</option>
                <option value="720p">720p</option>
              </select>
            </label>
          </div>
        </details>
      </section>
    </main>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
