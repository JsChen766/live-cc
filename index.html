<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/webrtc-adapter/8.1.2/adapter.min.js"
      integrity="sha512-l40eBFtXx+ve5RryIELC3y6/OM6Nu89mLGQd7fg1C93tN6XrkC3supb+/YiD/Y+B8P37kdJjtG1MT1kOO2VzxA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="stylesheet" href="./styles.css" />
    <title>LiveCC Single Room</title>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <div class="eyebrow">LiveCC Single Room</div>
          <h1>单房间直播页</h1>
          <p>同一个 Pages 地址，主播点击投屏后，观众访问同一页面即可自动观看当前直播。</p>
        </div>
        <div class="status-pill idle" id="status-pill">待机中</div>
      </header>

      <main class="layout">
        <section class="stage">
          <div class="stage-head">
            <div>
              <span class="room-label">Alpha Room</span>
              <h2>固定直播间</h2>
            </div>
            <div class="network-chip" id="network-chip">Idle</div>
          </div>

          <div class="video-shell">
            <video id="main-video" autoplay playsinline></video>
            <div class="empty-state" id="empty-state">
              <div class="empty-icon">LIVE</div>
              <h3 id="empty-title">当前未开播</h3>
              <p id="empty-copy">主播点击右侧“开始投屏”后，观众访问本页会自动看到直播。</p>
            </div>
          </div>

          <div class="metrics">
            <div class="metric-card">
              <span>连接状态</span>
              <strong id="metric-connection">Idle</strong>
            </div>
            <div class="metric-card">
              <span>音频状态</span>
              <strong id="metric-audio">关闭</strong>
            </div>
            <div class="metric-card">
              <span>画质</span>
              <strong id="metric-quality">1080p / 60fps</strong>
            </div>
            <div class="metric-card">
              <span>当前角色</span>
              <strong id="metric-role">观众</strong>
            </div>
          </div>
        </section>

        <aside class="sidebar">
          <section class="panel">
            <div class="panel-title">直播控制</div>
            <button id="start-btn" class="primary-btn">开始投屏</button>
            <button id="stop-btn" class="secondary-btn" disabled>停止投屏</button>
            <div class="status-box" id="status-text">页面加载完成，正在检查当前直播状态。</div>
          </section>

          <section class="panel">
            <div class="panel-title">主播设置</div>
            <label class="field">
              <span>管理密钥</span>
              <input id="host-token" type="password" placeholder="如果配置了 HOST_TOKEN，在这里输入" />
            </label>
            <label class="field">
              <span>分辨率</span>
              <select id="resolution-select">
                <option value="1080p" selected>1080p</option>
                <option value="720p">720p</option>
              </select>
            </label>
            <label class="field">
              <span>帧率</span>
              <select id="fps-select">
                <option value="60" selected>60 fps</option>
                <option value="30">30 fps</option>
              </select>
            </label>
            <label class="toggle-row">
              <div>
                <strong>系统音频</strong>
                <small>把桌面或标签页声音混入直播流</small>
              </div>
              <input id="audio-toggle" type="checkbox" checked />
            </label>
          </section>

          <section class="panel">
            <div class="panel-title">播放器控制</div>
            <label class="field">
              <span>音量</span>
              <input id="volume-range" type="range" min="0" max="100" value="80" />
            </label>
            <div class="button-row">
              <button id="mute-btn" class="ghost-btn">静音</button>
              <button id="fullscreen-btn" class="ghost-btn">全屏</button>
            </div>
            <label class="field">
              <span>清晰度标记</span>
              <select id="quality-select">
                <option value="Auto" selected>Auto</option>
                <option value="1080p">1080p</option>
                <option value="720p">720p</option>
              </select>
            </label>
          </section>
        </aside>
      </main>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
  </html>
